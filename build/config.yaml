# BoardingPass service configuration
# Install to: /etc/boardingpass/config.yaml

service:
  inactivity_timeout: "10m"
  session_ttl: "30m"
  sentinel_file: "/etc/boardingpass/issued"

transports:
  # Ethernet transport
  ethernet:
    enabled: true
    interfaces: []
    address: ""
    port: 8443
    tls_cert: "/var/lib/boardingpass/tls/server.crt"
    tls_key: "/var/lib/boardingpass/tls/server.key"

  # WiFi Access Point transport
  # Creates an open WiFi hotspot for phone-to-device connectivity.
  # hostapd.conf and dnsmasq.conf are auto-generated to /run/boardingpass/.
  # Requires hostapd and dnsmasq packages to be installed.
  wifi:
    enabled: true
    interface: ""                # Auto-detected if empty (scans /sys/class/net/*/wireless)
    ssid: ""                     # SSID name (default: BoardingPass-<hostname>)
    # password: "changeme123"    # WPA2 password (min 8 chars); omit for open network
    channel: 6                   # WiFi channel (1-165)
    address: "10.0.0.1"          # AP gateway IP address

  # Bluetooth PAN transport
  # Creates a Bluetooth Personal Area Network with BLE advertisement
  bluetooth:
    enabled: true
    adapter: "hci0"              # Bluetooth adapter (default: hci0)
    device_name: ""              # BLE advertised name (default: BoardingPass-<hostname>)
    address: "10.0.1.1"          # PAN bridge IP address

  # USB tethering transport
  # Auto-detects USB tethering interfaces and listens on them
  usb:
    enabled: true
    interface_prefix: "usb"      # Interface name prefix to match (also matches "rndis")

# Command allow-list
# max_params: 0 means no parameters accepted (default)
# max_params: N means up to N positional parameters can be passed
commands:
  - id: "set-hostname"
    path: "/usr/lib/boardingpass/scripts/set-hostname.sh"
    args: []
    max_params: 1

  - id: "set-ip"
    path: "/usr/lib/boardingpass/scripts/set-ip.sh"
    args: []
    max_params: 4

  - id: "set-dns"
    path: "/usr/lib/boardingpass/scripts/set-dns.sh"
    args: []
    max_params: 3

  - id: "set-ntp"
    path: "/usr/lib/boardingpass/scripts/set-ntp.sh"
    args: []
    max_params: 1

  - id: "wifi-scan"
    path: "/usr/lib/boardingpass/scripts/wifi-scan.sh"
    args: []
    max_params: 0
    sudo: false

  - id: "show-status"
    path: "/usr/lib/boardingpass/scripts/show-status.sh"
    args: []
    max_params: 0
    sudo: false

  - id: "restart-networkmanager"
    path: "/usr/bin/systemctl"
    args: ["restart", "NetworkManager"]
    max_params: 0

  - id: "reload-connection"
    path: "/usr/lib/boardingpass/scripts/reload-connection.sh"
    args: []
    max_params: 1

  - id: "connectivity-test"
    path: "/usr/lib/boardingpass/scripts/connectivity-test.sh"
    args: []
    max_params: 2

  - id: "enroll-insights"
    path: "/usr/lib/boardingpass/scripts/enroll-insights.sh"
    args: []
    max_params: 0

  - id: "enroll-flightctl"
    path: "/usr/lib/boardingpass/scripts/enroll-flightctl.sh"
    args: []
    max_params: 0

  - id: "restart-chronyd"
    path: "/usr/bin/systemctl"
    args: ["restart", "chronyd"]
    max_params: 0

paths:
  allow_list:
    - "/etc/systemd/"
    - "/etc/NetworkManager/"
    - "/etc/chrony.conf"
    - "/etc/chrony.d/"
    - "/etc/hostname"
    - "/etc/profile.d/"
    - "/etc/boardingpass/staging/"

logging:
  level: "info"
  format: "human"
