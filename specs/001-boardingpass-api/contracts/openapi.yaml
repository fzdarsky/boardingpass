openapi: 3.1.0

info:
  title: BoardingPass API
  version: 0.1.0
  description: |
    BoardingPass is a lightweight, ephemeral bootstrap service for headless Linux devices.
    It exposes a RESTful API over HTTPS (TLS 1.3) with SRP-6a authentication for secure
    device provisioning.

    **Note**: Version 0.1.0 is pre-stable. Breaking changes may occur before 1.0.0 release.

    ## Authentication Flow

    1. **SRP Init**: Client sends username and ephemeral public value `A`
    2. **SRP Init Response**: Server returns salt and ephemeral public value `B`
    3. **SRP Verify**: Client sends proof `M1`
    4. **SRP Verify Response**: Server returns proof `M2` and session token
    5. **Authenticated Requests**: All subsequent requests include session token in `Authorization` header

    ## Security

    - TLS 1.3 required (rejects TLS 1.2 and below)
    - SRP-6a mutual authentication (no PKI required)
    - Session tokens expire after 30 minutes (configurable, min 5m)
    - Device-unique passwords generated from hardware identifiers

    ## Lifecycle

    - Service self-terminates after 10 minutes of inactivity (configurable)
    - Service exits immediately if sentinel file (`/etc/boardingpass/issued`) exists
    - Sentinel file created after successful configuration provisioning
  contact:
    name: BoardingPass Project
    url: https://github.com/fzdarsky/boardingpass
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html

servers:
  - url: https://{device_ip}:8443
    description: BoardingPass device endpoint
    variables:
      device_ip:
        default: "192.168.1.100"
        description: IP address of the target device

tags:
  - name: Service
    description: Service identity and health
  - name: Authentication
    description: SRP-6a authentication endpoints
  - name: Device Info
    description: Device inventory and network state queries
  - name: Provisioning
    description: Configuration bundle provisioning
  - name: Commands
    description: Allow-listed command execution
  - name: Lifecycle
    description: Service lifecycle management

paths:
  /:
    get:
      operationId: getServiceInfo
      tags:
        - Service
      summary: Service identity
      description: |
        Returns service identity information. Always returns the service name.
        If a valid session token is provided, also returns the service version.

        This endpoint does NOT require authentication.
      parameters:
        - name: Authorization
          in: header
          required: false
          description: Optional Bearer token for authenticated response with version
          schema:
            type: string
            example: Bearer eyJhbGciOiJIUzI1NiIs...
      responses:
        "200":
          description: Service identity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceInfo'
              examples:
                unauthenticated:
                  summary: Unauthenticated response
                  value:
                    service: boardingpass
                authenticated:
                  summary: Authenticated response (includes version)
                  value:
                    service: boardingpass
                    version: v0.1.0

  /auth/srp/init:
    post:
      operationId: srpInit
      tags:
        - Authentication
      summary: Initialize SRP-6a handshake
      description: |
        Initiates the SRP-6a authentication handshake. Client sends username and
        ephemeral public value `A`. Server executes password generator script,
        computes verifier, and returns salt and ephemeral public value `B`.

        This endpoint does NOT require authentication.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SRPInitRequest'
            example:
              username: "boardingpass"
              A: "dGhpc2lzYW5leGFtcGxlZXBoZW1lcmFscHVibGljdmFsdWVB..."
      responses:
        '200':
          description: SRP handshake initialized successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SRPInitResponse'
              example:
                salt: "c29tZXJhbmRvbXNhbHR2YWx1ZQ=="
                B: "dGhpc2lzYW5leGFtcGxlZXBoZW1lcmFscHVibGljdmFsdWVC..."
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /auth/srp/verify:
    post:
      operationId: srpVerify
      tags:
        - Authentication
      summary: Verify SRP-6a proof and obtain session token
      description: |
        Completes the SRP-6a authentication handshake. Client sends proof `M1`.
        Server verifies the proof, computes proof `M2`, and issues a session token.

        This endpoint does NOT require authentication.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SRPVerifyRequest'
            example:
              M1: "dGhpc2lzYW5leGFtcGxlY2xpZW50cHJvb2Y="
      responses:
        '200':
          description: SRP verification successful, session token issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SRPVerifyResponse'
              example:
                M2: "dGhpc2lzYW5leGFtcGxlc2VydmVycHJvb2Y="
                session_token: "dGhpc2lzYXRva2VuaWQ.c2lnbmF0dXJlaGVyZQ"
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          description: Authentication failed (invalid proof)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "authentication_failed"
                message: "SRP proof verification failed"
        '500':
          $ref: '#/components/responses/InternalServerError'

  /info:
    get:
      operationId: getSystemInfo
      tags:
        - Device Info
      summary: Query device system information
      description: |
        Returns hardware and software characteristics of the device including
        TPM details, board information, CPU architecture, OS distribution, and FIPS mode status.

        Requires authentication.
      security:
        - sessionToken: []
      responses:
        '200':
          description: System information retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemInfo'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /network:
    get:
      operationId: getNetworkConfig
      tags:
        - Device Info
      summary: Query network interface state
      description: |
        Returns current network interface state including interface names, MAC addresses,
        link states, and IP addresses. Data is queried from NetworkManager via D-Bus.

        Requires authentication.
      security:
        - sessionToken: []
      responses:
        '200':
          description: Network configuration retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NetworkConfig'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /configure:
    post:
      operationId: provisionConfig
      tags:
        - Provisioning
      summary: Provision configuration bundle
      description: |
        Atomically provisions a configuration bundle containing multiple files.
        Files are written to a temporary directory, validated, then atomically moved
        to target paths under `/etc`. If any file operation fails, the entire
        bundle is rejected and no files are modified.

        This endpoint may be called multiple times during a provisioning session.
        It does not create the sentinel file or initiate shutdown.

        Requires authentication.
      security:
        - sessionToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfigBundle'
      responses:
        '200':
          description: Configuration bundle applied successfully
          content:
            application/json:
              schema:
                type: object
                required:
                  - status
                properties:
                  status:
                    type: string
                    enum: [success]
                    description: Operation status
                  message:
                    type: string
                    description: Human-readable success message
                    example: "Configuration bundle applied successfully. Service will terminate."
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          description: Configuration bundle application failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "provisioning_failed"
                message: "Failed to write file /etc/systemd/network/10-eth0.network: permission denied"

  /command:
    post:
      operationId: executeCommand
      tags:
        - Commands
      summary: Execute allow-listed command
      description: |
        Executes a command from the allow-list with sudo privileges. Commands are
        identified by string IDs mapped to executable paths in the service configuration.

        Commands may accept positional parameters (up to the configured `max_params`).
        Parameters are appended after a `--` separator to prevent option injection.
        The number and meaning of parameters is defined per command.

        Requires authentication.
      security:
        - sessionToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CommandRequest'
            example:
              id: "restart-networkmanager"
      responses:
        '200':
          description: Command executed (exit code may be non-zero)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommandResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Command not in allow-list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "command_forbidden"
                message: "Command 'unauthorized-command' is not in the allow-list"
        '500':
          $ref: '#/components/responses/InternalServerError'

  /complete:
    post:
      operationId: completeProvisioning
      tags:
        - Lifecycle
      summary: Signal provisioning completion
      description: |
        Signals that provisioning is complete. Creates the sentinel file and
        either shuts down the service gracefully or reboots the device.

        When `reboot` is false or omitted, the service shuts down gracefully
        (existing behavior). When `reboot` is true, the service creates the
        sentinel file, sends the response, then schedules a system reboot
        after a short delay (to ensure the response reaches the client).

        This is the final API call in a provisioning workflow.

        Requires authentication.
      security:
        - sessionToken: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompleteRequest'
      responses:
        '200':
          description: Provisioning marked complete, service shutting down
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompleteResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          description: Failed to create sentinel file or initiate shutdown
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

components:
  securitySchemes:
    sessionToken:
      type: http
      scheme: bearer
      bearerFormat: HMAC
      description: |
        Session token obtained from `/auth/srp/verify` endpoint.
        Format: `<token_id>.<signature>`

        Include in Authorization header: `Authorization: Bearer <session_token>`

  schemas:
    # ========== Service Schemas ==========

    ServiceInfo:
      type: object
      required:
        - service
      properties:
        service:
          type: string
          description: Service identifier, always "boardingpass"
          example: boardingpass
        version:
          type: string
          description: Service version (only present for authenticated requests)
          example: v0.1.0

    # ========== Authentication Schemas ==========

    SRPInitRequest:
      type: object
      required:
        - username
        - A
      properties:
        username:
          type: string
          description: SRP username (typically 'boardingpass')
          minLength: 1
          maxLength: 64
          example: "boardingpass"
        A:
          type: string
          description: Client ephemeral public value (Base64-encoded)
          pattern: '^[A-Za-z0-9+/]+=*$'
          example: "dGhpc2lzYW5leGFtcGxlZXBoZW1lcmFscHVibGljdmFsdWVB..."

    SRPInitResponse:
      type: object
      required:
        - salt
        - B
      properties:
        salt:
          type: string
          description: Base64-encoded salt (unique per bootc image build)
          pattern: '^[A-Za-z0-9+/]+=*$'
          example: "c29tZXJhbmRvbXNhbHR2YWx1ZQ=="
        B:
          type: string
          description: Server ephemeral public value (Base64-encoded)
          pattern: '^[A-Za-z0-9+/]+=*$'
          example: "dGhpc2lzYW5leGFtcGxlZXBoZW1lcmFscHVibGljdmFsdWVC..."

    SRPVerifyRequest:
      type: object
      required:
        - M1
      properties:
        M1:
          type: string
          description: Client proof (Base64-encoded)
          pattern: '^[A-Za-z0-9+/]+=*$'
          example: "dGhpc2lzYW5leGFtcGxlY2xpZW50cHJvb2Y="

    SRPVerifyResponse:
      type: object
      required:
        - M2
        - session_token
      properties:
        M2:
          type: string
          description: Server proof (Base64-encoded)
          pattern: '^[A-Za-z0-9+/]+=*$'
          example: "dGhpc2lzYW5leGFtcGxlc2VydmVycHJvb2Y="
        session_token:
          type: string
          description: "Session token (format: token_id.signature)"
          pattern: '^[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+$'
          example: "dGhpc2lzYXRva2VuaWQ.c2lnbmF0dXJlaGVyZQ"

    # ========== Device Info Schemas ==========

    SystemInfo:
      type: object
      required:
        - hostname
        - tpm
        - firmware
        - product
        - cpu
        - os
      properties:
        hostname:
          type: string
          description: Current system hostname
          example: "localhost.localdomain"
        tpm:
          $ref: '#/components/schemas/TPMInfo'
        firmware:
          $ref: '#/components/schemas/FirmwareInfo'
        product:
          $ref: '#/components/schemas/ProductInfo'
        cpu:
          $ref: '#/components/schemas/CPUInfo'
        os:
          $ref: '#/components/schemas/OSInfo'

    TPMInfo:
      type: object
      required:
        - present
      properties:
        present:
          type: boolean
          description: Whether TPM is present on device
          example: true
        type:
          type: string
          nullable: true
          enum: [discrete, firmware, virtual]
          description: TPM type classification (null if unknown or not present)
          example: "discrete"
        spec_version:
          type: string
          nullable: true
          enum: ["1.2", "2.0"]
          description: TPM specification version (null if not present)
          example: "2.0"
        manufacturer:
          type: string
          nullable: true
          description: TPM manufacturer (null if not present)
          example: "STMicroelectronics"
        model:
          type: string
          nullable: true
          description: TPM model identifier (null if not present)
          example: "SLB9670"

    FirmwareInfo:
      type: object
      description: System firmware information (BIOS, UEFI, or U-Boot)
      required:
        - vendor
        - version
        - date
      properties:
        vendor:
          type: string
          description: Firmware vendor name
          example: "American Megatrends International, LLC."
        version:
          type: string
          description: Firmware version string
          example: "F20"
        date:
          type: string
          description: Firmware release date
          example: "08/31/2023"

    ProductInfo:
      type: object
      description: Product identity as seen from the outside. Uses fallback chain from product to board fields.
      required:
        - vendor
        - family
        - name
        - version
        - serial
      properties:
        vendor:
          type: string
          description: System/product vendor
          example: "Gigabyte Technology Co., Ltd."
        family:
          type: string
          description: Product family
          example: "B550 Series"
        name:
          type: string
          description: Product name
          example: "B550 AORUS PRO"
        version:
          type: string
          description: Product version
          example: "x.x"
        serial:
          type: string
          description: Product serial number
          example: "GE123456789"

    CPUInfo:
      type: object
      required:
        - architecture
      properties:
        architecture:
          type: string
          description: CPU architecture
          enum:
            - x86_64
            - aarch64
            - armv7l
          example: "aarch64"

    OSInfo:
      type: object
      required:
        - distribution
        - version
        - fips_enabled
        - system_time
        - clock_synchronized
      properties:
        distribution:
          type: string
          description: Linux distribution name
          example: "Red Hat Enterprise Linux"
        version:
          type: string
          description: Distribution version
          example: "9.3"
        fips_enabled:
          type: boolean
          description: Whether FIPS 140-3 mode is enabled on the OS
          example: true
        system_time:
          type: string
          format: date-time
          description: >
            Current system time in UTC, ISO 8601 format.
            This value is dynamic and reflects the device's current clock.
          example: "2026-03-05T14:30:00Z"
        clock_synchronized:
          type: boolean
          description: >
            Whether the system clock is synchronized via NTP.
            True when timedatectl reports NTPSynchronized=yes.
          example: true

    NetworkConfig:
      type: object
      required:
        - interfaces
      properties:
        interfaces:
          type: array
          description: List of network interfaces
          maxItems: 32
          items:
            $ref: '#/components/schemas/NetworkInterface'

    NetworkInterface:
      type: object
      required:
        - name
        - mac_address
        - link_state
        - ip_addresses
        - type
        - speed
        - carrier
      properties:
        name:
          type: string
          description: Interface name
          pattern: '^[a-zA-Z0-9]+$'
          example: "eth0"
        mac_address:
          type: string
          description: MAC address (colon-separated hex)
          pattern: '^([0-9A-Fa-f]{2}:){5}[0-9A-Fa-f]{2}$'
          example: "dc:a6:32:12:34:56"
        link_state:
          type: string
          description: Link state
          enum:
            - up
            - down
          example: "up"
        ip_addresses:
          type: array
          description: Assigned IP addresses
          items:
            $ref: '#/components/schemas/IPAddress'
        type:
          type: string
          description: Interface type detected from sysfs
          enum:
            - ethernet
            - wifi
            - bridge
            - bond
            - vlan
            - virtual
          example: "ethernet"
        speed:
          type: integer
          description: Link speed in Mbps. -1 if unknown or not applicable.
          example: 1000
        carrier:
          type: boolean
          description: Whether a cable/link is detected (true = connected)
          example: true
        driver:
          type: string
          description: >
            Kernel driver name (e.g., "e1000e", "iwlwifi", "virtio_net").
            Empty string for virtual interfaces without a backing driver.
          example: "e1000e"
        vendor:
          type: string
          description: >
            Hardware vendor name (e.g., "Intel Corporation") or hex PCI ID
            (e.g., "0x8086") if hwdata unavailable. Empty for virtual interfaces.
          example: "Intel Corporation"
        model:
          type: string
          description: >
            Hardware model name (e.g., "Wi-Fi 6 AX201") or hex PCI ID
            (e.g., "0xa0f0") if hwdata unavailable. Empty for virtual interfaces.
          example: "I210 Gigabit Network Connection"

    IPAddress:
      type: object
      required:
        - ip
        - prefix
        - family
      properties:
        ip:
          type: string
          description: IP address (IPv4 or IPv6)
          oneOf:
            - format: ipv4
            - format: ipv6
          example: "192.168.1.100"
        prefix:
          type: integer
          description: Prefix length (CIDR notation)
          minimum: 0
          maximum: 128
          example: 24
        family:
          type: string
          description: Address family
          enum:
            - ipv4
            - ipv6
          example: "ipv4"

    # ========== Provisioning Schemas ==========

    ConfigBundle:
      type: object
      required:
        - files
      properties:
        files:
          type: array
          description: List of files to provision
          minItems: 1
          maxItems: 100
          items:
            $ref: '#/components/schemas/ConfigFile'

    ConfigFile:
      type: object
      required:
        - path
        - content
        - mode
      properties:
        path:
          type: string
          description: Target file path relative to /etc
          pattern: '^[a-zA-Z0-9/_.-]+$'
          minLength: 1
          maxLength: 255
          example: "systemd/network/10-eth0.network"
        content:
          type: string
          description: Base64-encoded file content
          pattern: '^[A-Za-z0-9+/]+=*$'
          example: "W01hdGNoXQpOYW1lPWV0aDAK..."
        mode:
          type: integer
          description: Unix file permissions (octal as decimal, e.g., 0644 = 420)
          minimum: 0
          maximum: 511
          example: 420

    # ========== Command Schemas ==========

    CommandRequest:
      type: object
      required:
        - id
      properties:
        id:
          type: string
          description: Command identifier from allow-list
          pattern: '^[a-z0-9-]+$'
          example: "set-hostname"
        params:
          type: array
          description: >
            Positional parameters appended after `--` separator.
            Number of items must not exceed the command's configured max_params.
          items:
            type: string
            maxLength: 1024
          maxItems: 10
          example: ["my-device"]

    CommandResponse:
      type: object
      required:
        - exit_code
        - stdout
        - stderr
      properties:
        exit_code:
          type: integer
          description: Command exit code
          example: 0
        stdout:
          type: string
          description: Standard output (UTF-8)
          example: "Service reloaded successfully."
        stderr:
          type: string
          description: Standard error (UTF-8)
          example: ""

    CompleteRequest:
      type: object
      properties:
        reboot:
          type: boolean
          description: >
            If true, create sentinel file and reboot the device (after a short
            delay to allow the HTTP response to reach the client).
            If false or omitted, create sentinel and shut down gracefully.
          default: false

    CompleteResponse:
      type: object
      required:
        - status
        - sentinel_file
      properties:
        status:
          type: string
          description: Completion status
          enum:
            - shutting_down
            - rebooting
          example: "shutting_down"
        sentinel_file:
          type: string
          description: Path to created sentinel file
          example: "/etc/boardingpass/issued"
        message:
          type: string
          description: Human-readable status message
          example: "Provisioning complete. Service will terminate in 5 seconds."

    # ========== Error Schemas ==========

    Error:
      type: object
      required:
        - error
        - message
      properties:
        error:
          type: string
          description: Machine-readable error code
          example: "authentication_failed"
        message:
          type: string
          description: Human-readable error message
          example: "SRP proof verification failed"
        details:
          type: object
          description: Additional error context (optional)
          additionalProperties: true

  responses:
    BadRequest:
      description: Invalid request (malformed JSON, missing required fields, validation error)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: "invalid_request"
            message: "Missing required field: username"

    Unauthorized:
      description: Authentication required (missing or invalid session token)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: "unauthorized"
            message: "Invalid or expired session token"

    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: "internal_server_error"
            message: "An unexpected error occurred"
