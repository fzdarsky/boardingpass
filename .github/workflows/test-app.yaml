name: App Tests

on:
  push:
    branches:
      - main
    paths:
      - 'mobile/**'
      - '.github/workflows/test-app.yaml'
  pull_request:
    branches:
      - main
    paths:
      - 'mobile/**'
      - '.github/workflows/test-app.yaml'

jobs:
  lint-and-typecheck:
    name: Lint and Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        run: make install-deps-app

      - name: Check generated code is up-to-date
        run: |
          make generate-app
          if [ -n "$(git status --porcelain)" ]; then
            echo "Error: Generated code is out of date. Please run 'make generate-app' and commit the changes."
            git status
            git diff
            exit 1
          fi

      - name: Lint and type check
        run: make lint-app

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        run: make install-deps-app

      - name: Generate API types
        run: make generate-app

      - name: Run unit tests
        run: make test-unit-app APP_TEST_ARGS="-- --coverage --maxWorkers=2"

      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          files: ./mobile/coverage/lcov.info
          flags: mobile-unit
          name: mobile-unit-tests

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        run: make install-deps-app

      - name: Generate API types
        run: make generate-app

      - name: Run integration tests
        run: make test-integration-app

  contract-tests:
    name: Contract Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        run: make install-deps-app

      - name: Run contract tests
        run: make test-contract-app
